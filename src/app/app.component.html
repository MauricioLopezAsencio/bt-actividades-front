<!-- Fondo: lluvia binaria con forma de Goku -->
<canvas #gokuCanvas class="app-bg-goku" aria-hidden="true"></canvas>

<ng-container *ngIf="!isLoginPage">
  <nav class="navbar navbar-expand-md navbar-dark app-navbar">
    <div class="container-fluid px-3 px-md-4">

      <!-- Logo / Brand -->
      <a routerLink="" class="navbar-brand brand-logo">
        <i class="bi bi-calendar-check brand-icon"></i>
        <span class="brand-text">Actividades</span>
      </a>

      <!-- Hamburger -->
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-md-1 align-items-md-center">
          <li class="nav-item">
            <a routerLink="" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}"
               class="nav-link nav-item-link">
              <i class="bi bi-calendar-check me-1"></i>Actividades
            </a>
          </li>

          <!-- Separador -->
          <li class="nav-item nav-separator"></li>

          <!-- Usuario + logout -->
          <li class="nav-item nav-user">
            <i class="bi bi-person-circle me-1"></i>
            <span class="nav-username">{{ authService.getUsername() }}</span>
          </li>
          <li class="nav-item">
            <button class="btn-logout" (click)="logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Salir
            </button>
          </li>
        </ul>
      </div>

    </div>
  </nav>
</ng-container>

<main [class.main-content]="!isLoginPage" [class.login-main]="isLoginPage"
      [class.container-fluid]="!isLoginPage" [class.px-3]="!isLoginPage"
      [class.px-md-4]="!isLoginPage" [class.py-4]="!isLoginPage">
  <router-outlet></router-outlet>
</main>

<ng-container *ngIf="!isLoginPage">
  <footer class="app-footer">
    <div class="footer-inner">
      <i class="bi bi-calendar-check footer-icon"></i>
      <span>© 2024 Mauricio López Asencio</span>
    </div>
  </footer>
</ng-container>
